{% extends "base.html" %}

{% block title %}
<title>หน้าแรกของเว็บไซต์</title>
{% endblock %}

{% block content %}


<table class="table table-hover">
    <thead>
        <tr>
            <th scope="col">รหัสผู้ลงทะเบียน</th>
            <th scope="col">ชื่อผู้ลงทะเบียน</th>
            <th scope="col">อายุ</th>
            <th scope="col">วันที่</th>
            <th scope="col">แก้ไข</th>
            <th scope="col">ลบ</th>
        </tr>
    </thead>
    <tbody>
    {% for person in all_person %}
    <tr>
        <th scope="row">{{person.id}}</th>
        <td>{{person.name}}</td>
        <td>{{person.age}}</td>
        <td>{{ person.date|date:"j F Y" }}</td>
        <td><a href="/edit/{{ person.id }}" class="btn btn-warning">แก้ไข</a></td>
        <td><a href="/delete/{{ person.id }}" class="btn btn-danger">ลบ</a></td>    
    </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
