<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <title>{% block title %}{% endblock %}</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;

        /* พื้นหลัง */
        background-color: #fff8ee;
        min-height: 100vh;
    }

    /* ===== Navbar ===== */
    .navbar {
        background-color: #be610b;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .navbar-brand {
        font-weight: 700;
        color: #f3eee8 !important;
        letter-spacing: 1px;
    }

    .nav-btn {
        background-color: #f3eee8;
        color: #be610b !important;
        border-radius: 25px;
        padding: 6px 18px;
        font-weight: 500;
        transition: 0.3s;
    }

    .nav-btn:hover {
        background-color: #ddd6cf;
        transform: translateY(-2px);
    }

        /* ===== HERO IMAGE ===== */
    .hero {
        height: 350px;
        background: 
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url("https://i.pinimg.com/736x/13/41/16/134116e4596f2378cc946cc994a46e60.jpg");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .hero-overlay h1 {
        color: white;
        font-size: 32px;
        font-weight: 600;
    }


    /* ===== Card กลางจอ ===== */
    .main-card {
        background-color: #fff8ee;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        margin-top: 60px;
        margin-bottom: 60px;
    }


    /* ===== Footer ===== */
    footer {
        background-color: #be610b;
        color: #f3eee8;
        padding: 25px 0;
        text-align: center;
    }
</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">NAMO CAFE</a>
        <div>
            <a class="nav-btn me-2" href="/">HOME</a>
            <a class="nav-btn me-2" href="/about">ABOUT</a>
            <a class="nav-btn" href="/form">LOGIN</a>
        </div>
    </div>
</nav>

<!-- ===== HERO SECTION ===== -->
<section class="hero">
    <div class="hero-overlay">
        <h1>“WELLCOME TO NAMO CAFE”</h1>
    </div>
</section>

<!-- ===== CONTENT ===== -->
<div class="container">
    <div class="main-card">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="container">
        <h5>Namo Cafe</h5>
        <small>© 2026 All Rights Reserved</small>
    </div>
</footer>

</body>
</html>
